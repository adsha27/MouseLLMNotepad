<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MouseKB Panel</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <main class="panel">
      <section class="hero">
        <div>
          <p class="eyebrow">MouseKB</p>
          <h1>Your working memory layer</h1>
        </div>
        <button id="openOptionsButton" class="ghost">Connection</button>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>AI Ready</h2>
          <span class="pill">Sanitized</span>
        </div>
        <div class="button-row">
          <button id="copySafeIntroButton" class="primary" type="button">Copy Safe Intro</button>
          <button id="copyCurrentContextButton" class="secondary" type="button">Copy Current Context</button>
          <button id="openChatGPTButton" class="ghost small" type="button">Open in ChatGPT</button>
        </div>
        <div class="stack">
          <article class="mini-block">
            <h3>Safe profile</h3>
            <p id="safeProfileSummary" class="snippet">MouseKB is still building your safe profile.</p>
          </article>
          <article class="mini-block">
            <h3>Active now</h3>
            <p id="activeNowSummary" class="snippet">Recent captures will roll up here after the fast-save path.</p>
          </article>
        </div>
        <div id="sharePolicies" class="rule-list"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Latest Capture</h2>
          <span id="lastCaptureStage" class="pill muted-pill">none</span>
        </div>
        <div id="lastCapture" class="stack"></div>
        <div class="button-row">
          <button id="reviewLastCaptureButton" class="secondary" type="button">Add note</button>
          <button id="markLastPrivateButton" class="ghost small" type="button">Mark private</button>
        </div>
      </section>

      <section class="card">
        <form id="searchForm" class="search-form">
          <input id="searchInput" type="search" placeholder="Search notes, topics, proofs, arguments…">
          <button class="primary" type="submit">Search</button>
        </form>
        <p id="searchStatus" class="status"></p>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Results</h2>
          <span id="resultCount" class="pill">0</span>
        </div>
        <div id="results" class="stack"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Topic Cards</h2>
          <span id="topicCardCount" class="pill">0</span>
        </div>
        <div id="topicCards" class="stack"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Approved profile</h2>
        </div>
        <div id="approvedProfile" class="stack"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Pending suggestions</h2>
        </div>
        <div id="pendingProfile" class="stack"></div>
      </section>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
  </html>
